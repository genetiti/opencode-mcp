name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the build+test job only needs to read the repo.
permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Runtime supports Node >=18 (package.json engines), but the test
        # toolchain (Vitest 4 / Vite 8) requires Node 20.19+ / 22.12+, so the
        # build+test matrix starts at 20.
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
